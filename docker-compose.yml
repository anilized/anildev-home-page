services:
  links-page:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_BASE_PATH: /links/
        VITE_GA_MEASUREMENT_ID: ${VITE_GA_MEASUREMENT_ID:-}
    image: anildev-links:latest
    container_name: anildev-links
    restart: unless-stopped
    ports:
      - "8080:80"
