apiVersion: apps/v1
kind: Deployment
metadata:
  name: links-page
  namespace: links
  labels:
    app: links-page
spec:
  replicas: 1
  selector:
    matchLabels:
      app: links-page
  template:
    metadata:
      labels:
        app: links-page
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: links-page
          image: ghcr.io/GITHUB_OWNER/links-page:IMAGE_TAG
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "64Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
