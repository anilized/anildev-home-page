name: Deploy Homepage to VPS

# This tells GitHub to run this script ONLY when you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Hostinger VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Navigate to the project folder
            cd ~/anildev-homepage
            
            # Pull the latest code from GitHub
            git pull origin main
            
            # Rebuild and restart the Docker container with the new code
            sudo docker compose up -d --build
            
            # Clean up old unused Docker images to save VPS disk space
            sudo docker image prune -f