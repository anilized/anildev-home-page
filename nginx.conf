server {
  listen 80;
  listen [::]:80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location = / {
    return 404;
  }

  location = /links {
    return 301 /links/;
  }

  location /links/ {
    try_files $uri $uri/ /links/index.html;
  }

  location = /healthz {
    access_log off;
    default_type text/plain;
    return 200 "ok";
  }
}
